<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EliteInvest | Real-Time Platform</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div id="auth-container" class="auth-wrapper">
        <div class="auth-box">
            <h2><i class="fa-solid fa-shield-halved"></i> Elite<span>Invest</span></h2>
            <div id="login-form">
                <input type="email" id="login-email" placeholder="Email">
                <input type="password" id="login-password" placeholder="Password">
                <button class="btn-main" onclick="handleLogin()">Sign In</button>
                <p>New here? <span onclick="toggleAuth()">Create Account</span></p>
            </div>
            <div id="register-form" style="display:none;">
                <input type="text" id="reg-name" placeholder="Full Name">
                <input type="email" id="reg-email" placeholder="Email">
                <input type="password" id="reg-password" placeholder="Password">
                <button class="btn-main" onclick="handleRegister()">Register</button>
                <p>Have an account? <span onclick="toggleAuth()">Login</span></p>
            </div>
        </div>
    </div>

    <div id="app-dashboard" class="app-shell" style="display:none;">
        <header class="main-header">
            <div class="user-info">
                <img src="https://ui-avatars.com/api/?name=User" id="user-img">
                <span id="display-name">Loading...</span>
            </div>
            <button onclick="handleLogout()" class="logout-btn"><i class="fa-solid fa-power-off"></i></button>
        </header>

        <section class="balance-card">
            <p>Net Balance (USDT)</p>
            <h1 id="user-balance">$0.00</h1>
            <div class="actions">
                <button onclick="showSheet('deposit')"><i class="fa-solid fa-plus"></i> Deposit</button>
                <button onclick="showSheet('withdraw')"><i class="fa-solid fa-minus"></i> Withdraw</button>
            </div>
        </section>

        <section class="plans">
            <h3>Active Portfolios</h3>
            <div class="plan-item gold" onclick="invest('Gold', 5.0)">
                <div class="plan-text">
                    <h4>Gold Strategy</h4>
                    <p>5% Daily Profit</p>
                </div>
                <div class="plan-icon"><i class="fa-solid fa-gem"></i></div>
            </div>
        </section>

        <nav class="bottom-nav">
            <div class="nav-link active"><i class="fa-solid fa-house"></i></div>
            <div class="nav-link"><i class="fa-solid fa-chart-pie"></i></div>
            <div class="nav-link"><i class="fa-solid fa-wallet"></i></div>
        </nav>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
