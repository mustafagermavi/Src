<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quantum Capital | Professional HYIP</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

    <div id="auth-container" class="auth-overlay">
        <div class="glass-auth-card">
            <div class="auth-header">
                <div class="neon-logo">Q<span>P</span></div>
                <h2>Next-Gen Investing</h2>
            </div>
            <div id="login-form">
                <div class="input-group">
                    <i class="fa-regular fa-envelope"></i>
                    <input type="email" id="login-email" placeholder="Email Address">
                </div>
                <div class="input-group">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="login-password" placeholder="Password">
                </div>
                <button class="btn-neon" onclick="handleLogin()">Login to Dashboard</button>
                <p class="toggle-p">New? <span onclick="toggleAuth()">Create Account</span></p>
            </div>
            <div id="register-form" style="display:none;">
                <input type="text" id="reg-name" placeholder="Full Name" class="glass-input">
                <input type="email" id="reg-email" placeholder="Email" class="glass-input">
                <input type="password" id="reg-password" placeholder="Password" class="glass-input">
                <button class="btn-neon" onclick="handleRegister()">Register Now</button>
                <p class="toggle-p">Have account? <span onclick="toggleAuth()">Login</span></p>
            </div>
        </div>
    </div>

    <div id="app-dashboard" class="app-container" style="display:none;">
        <header class="dashboard-header">
            <div class="user-profile">
                <div class="avatar-ring"><img src="https://ui-avatars.com/api/?name=User&background=00ff88&color=000" id="user-img"></div>
                <div class="user-txt">
                    <small>Welcome back,</small>
                    <h4 id="display-name">Investor</h4>
                </div>
            </div>
            <button class="logout-icon" onclick="handleLogout()"><i class="fa-solid fa-arrow-right-from-bracket"></i></button>
        </header>

        <section class="main-card">
            <div class="balance-labels">
                <span>Total Portfolio Value</span>
                <h1 id="user-balance">$0.00</h1>
                <div class="live-indicator"><span class="dot"></span> Live Updates</div>
            </div>
            <div class="quick-actions">
                <button class="action-btn" onclick="showDeposit()"><i class="fa-solid fa-wallet"></i> Deposit</button>
                <button class="action-btn outline" onclick="showWithdraw()"><i class="fa-solid fa-paper-plane"></i> Withdraw</button>
            </div>
        </section>

        <div class="market-ticker">
            <div class="ticker-item">BTC <span class="green">▲ 2.4%</span></div>
            <div class="ticker-item">ETH <span class="green">▲ 1.8%</span></div>
            <div class="ticker-item">USDT <span class="gray">0.0%</span></div>
        </div>

        <section class="portfolios">
            <div class="section-title">
                <h3>Investment Plans</h3>
                <i class="fa-solid fa-sliders"></i>
            </div>
            <div class="plan-grid">
                <div class="plan-card glass-effect gold" onclick="invest('Gold', 5.5)">
                    <div class="plan-icon"><i class="fa-solid fa-bolt-lightning"></i></div>
                    <h4>Flash Gold</h4>
                    <div class="roi">5.5% <span>/Day</span></div>
                    <p>Min: $500</p>
                </div>
                <div class="plan-card glass-effect silver" onclick="invest('Silver', 2.8)">
                    <div class="plan-icon"><i class="fa-solid fa-shield-halved"></i></div>
                    <h4>Safe Silver</h4>
                    <div class="roi">2.8% <span>/Day</span></div>
                    <p>Min: $100</p>
                </div>
            </div>
        </section>

        <nav class="bottom-nav">
            <div class="nav-item active"><i class="fa-solid fa-house-chimney"></i><span>Home</span></div>
            <div class="nav-item"><i class="fa-solid fa-chart-line"></i><span>Trade</span></div>
            <div class="nav-item"><i class="fa-solid fa-receipt"></i><span>History</span></div>
            <div class="nav-item"><i class="fa-solid fa-user-gear"></i><span>Settings</span></div>
        </nav>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
